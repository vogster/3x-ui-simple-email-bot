<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            background-color: #0b0f19;
            width: 100%;
            padding: 40px 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .content {
            padding: 40px 30px;
            line-height: 1.6;
        }
        .footer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid #1f2937;
            font-size: 12px;
            color: #6b7280;
        }
        .button {
            display: inline-block;
            background: linear-gradient(90deg, #3b82f6 0%, #6366f1 100%);
            color: #ffffff !important;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            margin: 20px 0;
            text-align: center;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.3);
        }
        .code-box {
            background-color: #1f2937;
            border: 1px dashed #374151;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            color: #a7f3d0;
            text-align: center;
            margin: 20px 0;
        }
        .progress-bar {
            background-color: #1f2937;
            border-radius: 8px;
            height: 16px;
            width: 100%;
            margin: 15px 0 5px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #10b981 0%, #3b82f6 100%);
            height: 100%;
            border-radius: 8px;
        }
        .stats-grid {
            display: table;
            width: 100%;
            margin: 20px 0;
        }
        .stats-row {
            display: table-row;
        }
        .stats-cell {
            display: table-cell;
            padding: 8px 0;
            border-bottom: 1px solid #1f2937;
        }
        .stats-label {
            font-weight: 600;
            color: #9ca3af;
        }
        .stats-value {
            text-align: right;
            color: #f3f4f6;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>{{title}}</h1>
            </div>
            <div class="content">
                {{content}}
            </div>
            <div class="footer">
                Это автоматическое письмо от сервиса {{service_name}}.<br>
                Если вы получили его по ошибке, просто проигнорируйте.
            </div>
        </div>
    </div>
</body>
</html>
